num_main_parties = 2
hub_party_id = 1
debug = true

## Crypto parameters
# Options: PN12QP109, PN13QP218, PN14QP438, PN15QP880, PN16QP1761
# Defined in ckks/params.go in Lattigo library
ckks_params = "PN14QP438"

# MPC parameters
div_sqrt_max_len = 100000 # TODO: currently ignored
mpc_num_threads = 3
mpc_field_size = 256
mpc_data_bits = 64
mpc_frac_bits = 32
mpc_boolean_shares = true


## Output and cache paths
output_dir = "out/"
cache_dir = "cache/"
binding_ipaddr = "0.0.0.0"

delay = 0

## Relative Matching Parameters
comparison_map = {"1" = [2]}
minimum = true
sqrt = false

## Networking parameters
# Party with a smaller ID listens for connection
# Port only needed for the listener
[servers.party0]
ipaddr = "127.0.0.1"
ports  = {party1 = "9050", party2 = "9060"}

[servers.party1]
ipaddr = "127.0.0.1"
ports  = {party2 = "9070"}

[servers.party2]
ipaddr = "127.0.0.1"
ports  = {}

