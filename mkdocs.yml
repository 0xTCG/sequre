site_name: Sequre Documentation
site_description: Comprehensive documentation for the Sequre/Shechi secure computation framework.
site_url: https://0xTCG.github.io/sequre/
repo_url: https://github.com/0xTCG/sequre
repo_name: 0xTCG/sequre

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
  - attr_list
  - def_list

extra:
  version: v1.0.0-beta

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: getting-started/quickstart.md
    - Build from Source: getting-started/build-from-source.md
  - Tutorials:
    - Basic MPC Computation: tutorials/basic-mpc.md
    - Secure Branching Without if: tutorials/secure-branching-without-if.md
    - One Algorithm, Many Secure Types: tutorials/one-algorithm-many-secure-types.md
    - Transitioning to MHE: tutorials/transition-mhe.md
    - Loading Private Data: tutorials/loading-private-data.md
    - Dropping Down the Stack: tutorials/dropping-down-the-stack.md
  - User Guide:
    - Distributed Tensors (MPU): user-guide/distributed-tensors.md
    - Secure Local Tensors (Ciphertensor): user-guide/secure-local-tensors.md
    - "MPC \u2194 MHE Switching": user-guide/switching.md
    - Running Distributed: user-guide/running-distributed.md
    - Troubleshooting: user-guide/troubleshooting.md
  - "Deep Dive: Shechi & MHE":
    - Core MHE Module: deep-dive-shechi/core-mhe.md
    - Ciphertensor Internals: deep-dive-shechi/ciphertensor-internals.md
  - "Deep Dive: Lattiseq":
    - Overview: deep-dive-lattiseq/overview.md
    - CKKS Operations: deep-dive-lattiseq/ckks-operations.md
  - Cryptography Corner:
    - Security Model & Assumptions: crypto-corner/security-assumptions.md
    - Schemes & Protocols: crypto-corner/schemes-protocols.md
  - API Reference:
    - Overview: api/index.md
    - Sharetensor: api/sharetensor.md
    - Ciphertensor: api/ciphertensor.md
    - Multiparty Types:
      - Overview: api/multiparty-types.md
      - MPU: api/mpu.md
      - MPP: api/mpp.md
      - MPA: api/mpa.md
    - MPC Instance: api/mpc-instance.md
    - Secure Stdlib: api/stdlib.md
    - Secure ML: api/learn.md
    - Decorators & Attributes: api/decorators.md
    - Lattiseq (CKKS): api/lattiseq.md
    - Configuration: api/configuration.md
  - Examples: examples.md
